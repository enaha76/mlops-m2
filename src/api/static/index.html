<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bank Marketing Predictor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: light dark; --accent: #2563eb; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { margin-bottom: 0.25rem; }
    p.sub { color: #666; margin-top: 0; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; }
    label { display: flex; flex-direction: column; font-size: 0.85rem; font-weight: 600; }
    input, select { padding: 0.5rem; border-radius: 6px; border: 1px solid #ccc;
                    font-size: 1rem; margin-top: 0.25rem; }
    button { grid-column: 1 / -1; padding: 0.75rem; border: 0; border-radius: 6px;
             background: var(--accent); color: white; font-size: 1rem; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    #result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
    #result.yes { background: #dcfce7; color: #166534; }
    #result.no  { background: #fee2e2; color: #991b1b; }
    #status { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    code { background: #f3f4f6; padding: 0 0.3rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Bank Marketing Predictor</h1>
  <p class="sub">Will this client subscribe to a term deposit? MLflow-registered model, served via FastAPI.</p>

  <form id="f">
    <label>Age<input name="age" type="number" value="41" required /></label>
    <label>Balance (EUR)<input name="balance" type="number" value="1500" required /></label>

    <label>Job
      <select name="job">
        <option>admin.</option><option>blue-collar</option><option>entrepreneur</option>
        <option>housemaid</option><option selected>management</option><option>retired</option>
        <option>self-employed</option><option>services</option><option>student</option>
        <option>technician</option><option>unemployed</option><option>unknown</option>
      </select>
    </label>
    <label>Marital
      <select name="marital">
        <option>divorced</option><option selected>married</option><option>single</option>
      </select>
    </label>

    <label>Education
      <select name="education">
        <option>primary</option><option>secondary</option>
        <option selected>tertiary</option><option>unknown</option>
      </select>
    </label>
    <label>Credit in default
      <select name="default"><option selected>no</option><option>yes</option></select>
    </label>

    <label>Housing loan
      <select name="housing"><option selected>yes</option><option>no</option></select>
    </label>
    <label>Personal loan
      <select name="loan"><option selected>no</option><option>yes</option></select>
    </label>

    <label>Contact type
      <select name="contact">
        <option selected>cellular</option><option>telephone</option><option>unknown</option>
      </select>
    </label>
    <label>Last contact month
      <select name="month">
        <option>jan</option><option>feb</option><option>mar</option><option>apr</option>
        <option selected>may</option><option>jun</option><option>jul</option><option>aug</option>
        <option>sep</option><option>oct</option><option>nov</option><option>dec</option>
      </select>
    </label>

    <label>Day of month<input name="day" type="number" value="15" min="1" max="31" required /></label>
    <label>Last contact duration (sec)<input name="duration" type="number" value="180" required /></label>

    <label>Campaign (# contacts this campaign)<input name="campaign" type="number" value="2" required /></label>
    <label>Pdays (days since last contact, -1 = never)<input name="pdays" type="number" value="-1" required /></label>

    <label>Previous (# contacts before campaign)<input name="previous" type="number" value="0" required /></label>
    <label>Previous outcome
      <select name="poutcome">
        <option>failure</option><option>other</option><option>success</option>
        <option selected>unknown</option>
      </select>
    </label>

    <button type="submit">Predict</button>
  </form>

  <div id="result"></div>
  <div id="status"></div>

  <script>
    const numericFields = new Set(["age","balance","day","duration","campaign","pdays","previous"]);
    const form = document.getElementById("f");
    const result = document.getElementById("result");
    const status = document.getElementById("status");

    async function refreshStatus() {
      try {
        const r = await fetch("/");
        const j = await r.json();
        status.innerHTML = `API: <b>${j.status}</b> · model: <code>${j.model_version ?? "none"}</code>`;
      } catch (e) { status.textContent = "API unreachable"; }
    }

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const body = {};
      for (const [k, v] of new FormData(form)) {
        body[k] = numericFields.has(k) ? Number(v) : v;
      }
      result.style.display = "block";
      result.className = "";
      result.textContent = "Predicting…";

      try {
        const r = await fetch("/predict", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
        const j = await r.json();
        result.className = j.prediction === "yes" ? "yes" : "no";
        const pct = (j.probability_yes * 100).toFixed(1);
        result.innerHTML = `<b>${j.prediction.toUpperCase()}</b> — probability this client subscribes: ${pct}%`;
      } catch (e) {
        result.className = "";
        result.textContent = "Error: " + e.message;
      }
    });

    refreshStatus();
  </script>
</body>
</html>
